<!DOCTYPE html>
<html>
    <head>
        <title> Registro de Clientes </title>
        <link rel="stylesheet" href="estilos3.css">
    </head>
    <body>
        <div class="container">
            <h2>Registro de Clientes </h2>
            <form>
                <div class="campo">
                    <label>Cédula:</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Nombre:</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Dirección:</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Teléfono:</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Correo:</label>
                    <input type="text">
                </div>
                <button type="submit">Guardar</button>
            </form>
        </div>
    </body>
</html>
